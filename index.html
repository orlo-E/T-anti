<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨반짝반짝 초강력 구구단✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #00ff00;
            --neon-yellow: #ffff00;
            --neon-orange: #ff3c00;
        }

        body {
            margin: 0;
            padding: 30px;
            background: #000;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 255, 0.2), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 255, 0.2), transparent 25%);
            background-size: 200% 200%;
            animation: bgShift 3s ease-in-out infinite alternate;
            color: #fff;
            font-family: 'Black Han Sans', 'Comic Sans MS', sans-serif;
            text-align: center;
            overflow-x: hidden;
            cursor: crosshair;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        h1 {
            font-size: 5vw;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 5px;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-pink),
                0 0 80px var(--neon-pink);
            animation: pulseNeon 0.8s infinite alternate, wobble 2s infinite ease-in-out;
        }

        @keyframes pulseNeon {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink); transform: scale(1); }
            100% { text-shadow: 0 0 2px #fff, 0 0 5px #fff, 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue); color: var(--neon-yellow); transform: scale(1.05); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .btn-mode {
            background: #000;
            color: var(--neon-green);
            border: 3px solid var(--neon-green);
            padding: 15px 40px;
            font-size: 2rem;
            font-family: 'Black Han Sans';
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px var(--neon-green);
            transition: all 0.3s;
            margin-bottom: 30px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .btn-mode:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px var(--neon-green), inset 0 0 20px #fff;
            transform: scale(1.1);
        }

        .gugudan-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .dan-card {
            background: rgba(20, 20, 20, 0.9);
            border: 4px solid var(--neon-green);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px var(--neon-green);
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .dan-card:nth-child(even) { border-color: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow), inset 0 0 10px var(--neon-yellow); }
        .dan-card:nth-child(3n) { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink), inset 0 0 10px var(--neon-pink); }
        .dan-card:nth-child(4n) { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue), inset 0 0 10px var(--neon-blue); }

        .dan-card:hover {
            transform: scale(1.15) translateY(-15px) rotate(3deg);
            box-shadow: 0 0 40px #fff, inset 0 0 20px #fff;
            border-color: #fff !important;
            z-index: 10;
        }
        .dan-card:hover:nth-child(even) { transform: scale(1.15) translateY(-15px) rotate(-3deg); }

        .dan-title {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--neon-yellow);
            text-shadow: 4px 4px 0 #ff0000, 0 0 15px var(--neon-yellow);
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .equation {
            font-size: 1.8rem;
            margin: 10px 0;
            letter-spacing: 2px;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-shadow: 2px 2px 0px #000;
            transition: all 0.1s;
        }

        .equation:hover {
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff;
            transform: scale(1.2) rotate(1deg);
            padding: 5px 0;
        }

        .number-highlight { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .dan-card:nth-child(even) .number-highlight { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }
        .dan-card:nth-child(3n) .number-highlight { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .dan-card:nth-child(4n) .number-highlight { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* Game UI */
        #game-container {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: rgba(10, 10, 10, 0.8);
            border: 5px dashed var(--neon-pink);
            border-radius: 30px;
            box-shadow: 0 0 30px var(--neon-pink);
            position: relative;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            border-bottom: 3px solid var(--neon-blue);
            padding-bottom: 10px;
        }
        
        .score-box { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }
        .lives-box { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .question-box {
            font-size: 6rem;
            margin: 40px 0;
            color: #fff;
            text-shadow: 5px 5px 0 #ff00ff, -5px -5px 0 #00ffff;
            animation: pulseNeon 0.5s infinite alternate;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .answer-btn {
            background: #111;
            color: #fff;
            border: 4px solid var(--neon-yellow);
            border-radius: 20px;
            font-size: 3rem;
            font-family: 'Black Han Sans';
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-yellow);
            transition: all 0.2s;
        }

        .answer-btn:hover {
            background: var(--neon-yellow);
            color: #000;
            transform: scale(1.1);
        }

        .answer-btn:nth-child(2) { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .answer-btn:nth-child(2):hover { background: var(--neon-green); }
        .answer-btn:nth-child(3) { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .answer-btn:nth-child(3):hover { background: var(--neon-blue); }
        .answer-btn:nth-child(4) { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .answer-btn:nth-child(4):hover { background: var(--neon-pink); }

        /* 이펙트 */
        .sparkle {
            position: absolute;
            pointer-events: none;
            width: 30px;
            height: 30px;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: explode 0.6s forwards ease-out;
            z-index: 100;
        }

        @keyframes explode {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        .bling {
            position: fixed;
            font-size: 3.5rem;
            animation: fall linear infinite;
            z-index: -1;
            opacity: 0.6;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        .shake {
            animation: shakeScreen 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeScreen {
            10%, 90% { transform: translate3d(-10px, 0, 0); }
            20%, 80% { transform: translate3d(20px, 0, 0) rotate(2deg); background-color: rgba(255,0,0,0.3); }
            30%, 50%, 70% { transform: translate3d(-25px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(25px, 0, 0) rotate(2deg); }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 25px;
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .game-over-title {
            font-size: 5rem;
            color: red;
            text-shadow: 0 0 20px red, 0 0 40px yellow;
            margin-bottom: 20px;
            animation: bounce 0.5s infinite alternate;
        }

    </style>
</head>
<body>

    <h1 id="main-title">✨ 울트라 판타스틱 킹왕짱 구구단 ✨</h1>
    
    <button id="toggle-btn" class="btn-mode" onclick="toggleMode()">🎮 게임 모드 시작하기 🎮</button>

    <!-- 구구단 표 뷰 -->
    <div class="gugudan-container" id="gugudan-container">
        <!-- JS로 채워짐 -->
    </div>

    <!-- 게임 뷰 -->
    <div id="game-container">
        <div class="game-header">
            <div class="score-box">점수: <span id="score">0</span></div>
            <div class="lives-box">목숨: <span id="lives">💖💖💖</span></div>
        </div>
        
        <div class="question-box" id="question">7 X 8 = ?</div>
        
        <div class="answers-grid">
            <button class="answer-btn" onclick="checkAnswer(0)" id="ans-0">56</button>
            <button class="answer-btn" onclick="checkAnswer(1)" id="ans-1">48</button>
            <button class="answer-btn" onclick="checkAnswer(2)" id="ans-2">64</button>
            <button class="answer-btn" onclick="checkAnswer(3)" id="ans-3">42</button>
        </div>

        <div id="game-over-screen">
            <div class="game-over-title">GAME OVER💥</div>
            <div style="font-size: 3rem; margin-bottom: 30px;">최종 점수: <span id="final-score" style="color:var(--neon-yellow)">0</span>점</div>
            <button class="btn-mode" onclick="startGame()">다시 도전! 🚀</button>
        </div>
    </div>

    <div class="footer-text" id="footer-text">💯 다 외우면 아이스크림 쏜다!!! 🚀</div>

    <script>
        // === 1. 구구단 표 생성 로직 ===
        const tableContainer = document.getElementById('gugudan-container');
        for (let i = 2; i <= 9; i++) {
            const card = document.createElement('div');
            card.className = 'dan-card';
            let html = `<div class="dan-title">${i}단</div>`;
            for (let j = 1; j <= 9; j++) {
                html += `
                    <div class="equation">
                        <span>${i}</span> <span>X</span> <span>${j}</span> <span>=</span> <span class="number-highlight">${i*j}</span>
                    </div>
                `;
            }
            card.innerHTML = html;
            card.addEventListener('click', function(e) {
                createSparkles(e.clientX, e.clientY);
                this.style.transform = "scale(1.2) rotate(" + (Math.random() > 0.5 ? 5 : -5) + "deg)";
                setTimeout(() => { this.style.transform = ""; }, 150);
            });
            tableContainer.appendChild(card);
        }

        // === 2. 모드 전환 ===
        let isGameMode = false;
        function toggleMode() {
            isGameMode = !isGameMode;
            if (isGameMode) {
                document.getElementById('gugudan-container').style.display = 'none';
                document.getElementById('footer-text').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                document.getElementById('toggle-btn').innerText = '📚 구구단 표 보기 📚';
                document.getElementById('toggle-btn').style.borderColor = 'var(--neon-pink)';
                document.getElementById('toggle-btn').style.color = 'var(--neon-pink)';
                startGame();
            } else {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('gugudan-container').style.display = 'grid';
                document.getElementById('footer-text').style.display = 'block';
                document.getElementById('toggle-btn').innerText = '🎮 게임 모드 시작하기 🎮';
                document.getElementById('toggle-btn').style.borderColor = 'var(--neon-green)';
                document.getElementById('toggle-btn').style.color = 'var(--neon-green)';
            }
        }

        // === 3. 게임 로직 ===
        let score = 0;
        let lives = 3;
        let currentAnswer = 0;

        function startGame() {
            score = 0;
            lives = 3;
            document.getElementById('score').innerText = score;
            updateLivesUI();
            document.getElementById('game-over-screen').style.display = 'none';
            nextQuestion();
        }

        function nextQuestion() {
            const num1 = Math.floor(Math.random() * 8) + 2; // 2~9
            const num2 = Math.floor(Math.random() * 9) + 1; // 1~9
            currentAnswer = num1 * num2;
            
            document.getElementById('question').innerText = `${num1} X ${num2} = ?`;

            // 정답을 포함한 4개의 보기 만들기
            let answers = [currentAnswer];
            while(answers.length < 4) {
                // 오답 생성 (근처 숫자로 헷갈리게)
                let fakeOffset = (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
                let fakeAnswer = currentAnswer + fakeOffset;
                if(fakeAnswer > 0 && !answers.includes(fakeAnswer)) {
                    answers.push(fakeAnswer);
                }
            }
            
            // 보기 섞기 (Fisher-Yates)
            for (let i = answers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answers[i], answers[j]] = [answers[j], answers[i]];
            }

            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`ans-${i}`);
                btn.innerText = answers[i];
                // 눌렀을 때의 효과를 위해 값 속성 저장
                btn.dataset.val = answers[i];
            }
        }

        function checkAnswer(index) {
            const selectedBtn = document.getElementById(`ans-${index}`);
            const selectedVal = parseInt(selectedBtn.dataset.val);

            if(selectedVal === currentAnswer) {
                // 정답!
                score += 10;
                document.getElementById('score').innerText = score;
                createSparkles(window.innerWidth/2, window.innerHeight/2, 30); // 축하 파티클
                
                // 정답 버튼 초록색으로 번쩍
                const originalBg = selectedBtn.style.background;
                selectedBtn.style.background = 'var(--neon-green)';
                selectedBtn.style.color = '#000';
                
                setTimeout(() => {
                    selectedBtn.style.background = originalBg;
                    selectedBtn.style.color = '';
                    nextQuestion();
                }, 300);

            } else {
                // 오답!
                lives -= 1;
                updateLivesUI();
                
                // 화면 흔들림 효과
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 400);

                // 오답 버튼 빨간색으로 번쩍
                const originalBg = selectedBtn.style.background;
                selectedBtn.style.background = 'red';
                selectedBtn.style.color = '#fff';
                
                setTimeout(() => {
                    selectedBtn.style.background = originalBg;
                    selectedBtn.style.color = '';
                    if(lives <= 0) {
                        endGame();
                    }
                }, 400);
            }
        }

        function updateLivesUI() {
            let hearts = '';
            for(let i=0; i<lives; i++) hearts += '💖';
            for(let i=0; i<(3-lives); i++) hearts += '💔';
            document.getElementById('lives').innerText = hearts;
        }

        function endGame() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        // === 4. 글로벌 이펙트 ===
        document.body.addEventListener('click', function(e) {
            if(!e.target.closest('.dan-card') && !e.target.closest('.answer-btn')) {
                createSparkles(e.clientX, e.clientY, 5);
            }
        });

        function createSparkles(x, y, count = 12) {
            const colors = ['#ff00ff', '#00ffff', '#00ff00', '#ffff00', '#ff3c00', '#ffffff'];
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                
                const angle = (Math.random() * Math.PI * 2);
                const distance = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                
                sparkle.style.setProperty('--tx', tx);
                sparkle.style.setProperty('--ty', ty);
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                sparkle.style.backgroundColor = color;
                sparkle.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;

                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);
            }
        }

        const emojis = ['⭐', '💫', '💖', '🎵', '⚡', '🔥', '💥', '✨', '🌈', '😎'];
        setInterval(() => {
            const bling = document.createElement('div');
            bling.className = 'bling';
            bling.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            bling.style.left = Math.random() * 100 + 'vw';
            bling.style.animationDuration = Math.random() * 3 + 2 + 's';
            bling.style.transform = `scale(${Math.random() + 0.5})`;
            document.body.appendChild(bling);
            setTimeout(() => bling.remove(), 5000);
        }, 200);
    </script>
</body>
</html>
